        if(isOrig){if(cvBM>0.40)aiS+=0.0;else if(cvBM>0.28)aiS+=0.04;else aiS+=0.10;}
        else{if(cvBM>0.32)aiS+=0.0;else if(cvBM>0.24)aiS+=0.04;else aiS+=0.10;}
        if(Math.abs(ac)<0.40)aiS+=0.0;else if(Math.abs(ac)<0.60)aiS+=0.03;else aiS+=0.06;
        if(hasQuadAnomaly)aiS+=0.16;
        if(cvBM<0.28&&tR>0.30)aiS+=0.10;
        if(!isOrig&&eR<0.05)aiS+=0.10;
        if(!isOrig&&eR<0.10&&hasQuadAnomaly)aiS+=0.08;
        const aiP=Math.min(Math.max(aiS,0.03),0.96);
        let tamper;
        if(hasQuadAnomaly&&mxSp>14)tamper=0.60;else if(hasQuadAnomaly)tamper=0.30;
        else if(mxSp>26)tamper=0.52;else if(mxSp>18)tamper=0.24;else if(mxSp>10)tamper=0.08;else tamper=0.03;
        let lightScore;
        if(isOrig){if(cvBM>0.35)lightScore=0.15;else if(cvBM>0.22)lightScore=0.38;else lightScore=0.65;}
        else{if(cvBM>0.28)lightScore=0.15;else if(cvBM>0.18)lightScore=0.38;else lightScore=0.65;}
        return{aiProbability:aiP,tamperingProbability:Math.min(Math.max(tamper,0.03),0.78),lightScore,quadrants:qStats,qCv,hasQuadAnomaly,details:{pixelCount:n,entropy:ent.toFixed(2),smoothR:(sR*100).toFixed(1),textureR:(tR*100).toFixed(1),edgeR:(eR*100).toFixed(1),dCv:dCv.toFixed(2),cvBM:cvBM.toFixed(3),autocorr:ac.toFixed(4),mxSp:mxSp.toFixed(1),blockCount:allV.length}};
      }

      // ==================== 通过 CORS 代理调用 API ====================
      async function queryAIModel(base64Image) {
        let base64Data = base64Image.split(',')[1];

        // 压缩图片
        if (base64Data.length > 2 * 1024 * 1024 / 4 * 3) {
          console.log('⚠️ 压缩图片...');
          const compressed = await compressImage(base64Image, 600, 0.65);
          base64Data = compressed.split(',')[1];
        }

        const requestBody = JSON.stringify({ input: { image: base64Data } });

        // 依次尝试每个代理
        for (const proxy of CORS_PROXIES) {
          try {
            const proxyUrl = proxy + encodeURIComponent(API_TARGET);
            console.log('🔄 尝试代理:', proxy.split('//')[1].split('/')[0]);

            const response = await fetch(proxyUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${MODELSCOPE_TOKEN}`,
                'X-Requested-With': 'XMLHttpRequest'
              },
              body: requestBody
            });

            if (!response.ok) {
              console.warn('代理返回错误:', response.status);
              continue;
            }

            const text = await response.text();
            console.log('📩 代理返回原始数据:', text.substring(0, 200));

            let result;
            try {
              result = JSON.parse(text);
            } catch {
              // 可能是包装过的，尝试提取JSON部分
              const jsonMatch = text.match(/\{[\s\S]*\}/);
              if (jsonMatch) result = JSON.parse(jsonMatch[0]);
              else continue;
            }

            let aiScore = null;
            if (result.output) {
              if (result.output.probabilities?.length >= 2) {
                aiScore = result.output.probabilities[1];
              } else if (typeof result.output.prediction === 'number') {
                aiScore = result.output.prediction;
              }
            } else if (result.probabilities?.length >= 2) {
              aiScore = result.probabilities[1];
            }

            if (aiScore !== null) {
              console.log('✅ AI模型得分:', (aiScore * 100).toFixed(1) + '%');
              return aiScore;
            }
          } catch (error) {
            console.warn('代理请求失败:', error.message);
            continue;
          }
        }

        console.warn('❌ 所有代理均不可用');
        return null;
      }

      function compressImage(base64, maxWidth, quality) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = base64;
        });
      }

      function conf(s,t){if(t==='meta')return s>0.95?'98%':(s>0.8?'94%':(s>0.6?'80%':'55%'));if(t==='tamper')return s>0.5?'84%':s>0.20?'77%':s>0.06?'73%':'71%';const a=Math.abs(s-0.5);return a>0.30?'90%':a>0.16?'82%':a>0.06?'73%':'68%';}

      function render(an,meta,aiModelScore){
        const ap=an.aiProbability,tp=an.tamperingProbability,d=an.details,ls=an.lightScore;
        const isOrig=meta.isOriginal,isTP=meta.isThirdParty;
        const hasII=meta.integrityIssues.length>0;
        const aiHighButOrig=ap>0.35&&isOrig;
        const integrityCompromised=hasII||aiHighButOrig;

        let finalAiScore, modelUsed = false;
        if (aiModelScore !== null) {
          finalAiScore = aiModelScore * 0.70 + ap * 0.30;
          modelUsed = true;
        } else {
          finalAiScore = ap;
        }

        let aiR,aiD,aiC;
        if(finalAiScore>0.35){aiR='高风险';aiD=modelUsed?'AI模型+本地均检测到异常。':'多项指标与AI生成高度吻合。';aiC='risk-high';}
        else if(finalAiScore>0.20){aiR='中等';aiD='部分指标偏离。';aiC='risk-mid';}
        else{aiR='低风险';aiD='符合自然拍摄特征。';aiC='risk-low';}

        let metaR,metaC,metaD,metaConf;
        if(integrityCompromised&&isOrig){metaR='可疑(可能伪造)';metaC='risk-high';metaD=`设备：${meta.device} | ⚠️ 元数据与像素不一致`;metaConf='45%';}
        else if(integrityCompromised&&meta.hasExif){metaR='需关注(完整性)';metaC='risk-mid';metaD=`设备：${meta.device} | ⚠️ 完整性存疑`;metaConf='58%';}
        else if(isOrig){metaR='可信(原图 ✓)';metaC='risk-low';metaD=`设备：${meta.device} · ${meta.resolution}`;metaConf='98%';}
        else if(isTP){metaR='需关注(第三方)';metaC='risk-mid';metaD=`设备：${meta.device} | ⚠️ ${meta.softwareRisk}`;metaConf='62%';}
        else if(meta.hasExif){metaR='可信';metaC='risk-low';metaD=`设备：${meta.device} · ${meta.resolution}`;metaConf='90%';}
        else{metaR='缺失(传输)';metaC='risk-high';metaD='EXIF被清除。';metaConf='55%';}

        let tR,tD,tC;
        if(tp>0.45){tR='可疑';tD='区域差异过大。';tC='risk-high';}
        else if(tp>0.20){tR='需关注';tD=an.hasQuadAnomaly?'象限分布极不均。':'部分区域存在差异。';tC='risk-mid';}
        else if(tp>0.06){tR='微异常';tD='极轻微差异。';tC='risk-low';}
        else{tR='未发现';tD='一致性良好。';tC='risk-low';}

        let lR,lD,lC;
        if(ls<0.25){lR='合理';lD='光影自然。';lC='risk-low';}
        else if(ls<0.48){lR='需关注';lD='光影略有异常。';lC='risk-mid';}
        else{lR='异常';lD='光影异常。';lC='risk-high';}

        const metaPenalty=integrityCompromised?0.18:(isOrig?-0.08:(isTP?0.16:(meta.hasExif?0.03:0.05)));
        const ov=finalAiScore*0.50+metaPenalty+tp*0.15+(lR==='异常'?0.08:lR==='需关注'?0.03:0);

        let vi,vt,vbc,vbt;
        if(ov>0.35){vi='danger';vt='疑似AI生成或篡改';vbc='badge-danger';vbt='建议复核';}
        else if(ov>0.22){vi='warning';vt='真实拍摄 · 可能存在AI优化';vbc='badge-warning';vbt='计算摄影';}
        else{vi='safe';vt='高置信度真实影像';vbc='badge-safe';vbt='可信';}

        const tags=[];
        if(isOrig&&!integrityCompromised)tags.push('<span style="background:#dbeafe;color:#1e40af;">📷 原图</span>');
        if(integrityCompromised)tags.push('<span style="background:#fee2e2;color:#991b1b;">⚠️ 完整性存疑</span>');
        if(isTP)tags.push('<span style="background:#fef3c7;color:#92400e;">⚠️ 第三方</span>');
        if(an.hasQuadAnomaly)tags.push('<span style="background:#fef2f2;color:#991b1b;">🔲 象限异常</span>');
        if(modelUsed)tags.push('<span style="background:#dbeafe;color:#1e40af;">🤖 AI模型</span>');

        els.verdictArea.innerHTML=`<div class="verdict-icon ${vi}">${vi==='safe'?'✅':vi==='warning'?'📱':'⚠️'}</div><div><div class="verdict-text">${vt}</div><span class="verdict-badge ${vbc}">${vbt}</span><div class="verdict-tags">${tags.join(' ')}</div></div>`;

        const items=[
          {icon:'🧠',label:'生成式AI痕迹',value:aiR,cls:aiC,desc:aiD,conf:conf(finalAiScore,'ai'),detail:`综合=${(finalAiScore*100).toFixed(0)}%`+(modelUsed?` (AI模型${(aiModelScore*100).toFixed(0)}% + 本地${(ap*100).toFixed(0)}%)`:' (仅本地)')},
          {icon:'📋',label:'元数据可信度',value:metaR,cls:metaC,desc:metaD,conf:metaConf,detail:integrityCompromised?'⚠️ 交叉验证失败':(isOrig?'✓ 完整':(isTP?`⚠️ ${meta.softwareRisk}`:'传输清除'))},
          {icon:'✂️',label:'拼接/篡改检测',value:tR,cls:tC,desc:tD,conf:conf(tp,'tamper'),detail:`多尺度=${d.mxSp} | 象限=${(an.qCv*100).toFixed(1)}%`},
          {icon:'💡',label:'物理/光影一致性',value:lR,cls:lC,desc:lD,conf:conf(ls,'light'),detail:`块CV=${d.cvBM} | 差异CV=${d.dCv}`}
        ];
        els.dimensionsContainer.innerHTML=items.map(i=>`<div class="dimension"><div class="dim-top"><span class="dim-icon">${i.icon}</span><div><div class="dim-label">${i.label}</div><div class="dim-desc">${i.desc}</div><div class="dim-detail">${i.detail}</div></div></div><div class="dim-bottom"><div class="dim-value ${i.cls}">${i.value}<span class="confidence-tag">${i.conf}</span></div></div></div>`).join('');

        if(integrityCompromised){let w='<strong>⚠️ 完整性警告：</strong><br>';if(aiHighButOrig)w+='• 像素AI特征与元数据原图声明矛盾<br>';meta.integrityIssues.forEach(i=>{w+=`• ${i}<br>`;});els.integrityWarn.innerHTML=w;els.integrityWarn.style.display='block';}else{els.integrityWarn.style.display='none';}
        els.quadrantInfo.innerHTML=`<strong>🔲 四象限：</strong>`+an.quadrants.map(q=>`${q.name}=${(q.edgeR*100).toFixed(1)}%`).join(' | ')+` | 差异=${(an.qCv*100).toFixed(1)}%`;
        els.exifNote.innerHTML=meta.note;els.exifNote.style.display='block';
        els.analysisNote.innerHTML=`<strong>📝 综合（阈值0.35）：</strong>AI=${(finalAiScore*100).toFixed(0)}%×0.50=${(finalAiScore*0.50).toFixed(3)}${modelUsed?' (🤖+本地)':' (仅本地)'} | 元数据=${metaPenalty>0?'+'+metaPenalty.toFixed(2):metaPenalty.toFixed(2)} | 拼接=${(tp*100).toFixed(0)}%×0.15=${(tp*0.15).toFixed(3)}<br><b>总分=${ov.toFixed(3)}</b>（>0.35=疑似AI）`;
        els.resultCard.style.display='block';els.resultCard.scrollIntoView({behavior:'smooth',block:'nearest'});
      }

      async function start(f){
        els.analyzeBtn.disabled=true;els.progressContainer.style.display='block';els.resultCard.style.display='none';els.exifNote.style.display='none';els.integrityWarn.style.display='none';
        const up=(p,m)=>{els.progressFill.style.width=p+'%';els.progressPercent.textContent=p+'%';els.statusText.textContent=m;};

        up(10,'⏳ 读取EXIF...');
        getExifData(f,meta=>{
          up(20,'🖼️ 解码...');
          const img=new Image();
          img.onload=async()=>{
            up(35,'🔬 本地分析...');
            const {grayMatrix,width,height}=await extractPixels(img,700);
            const an=analyze(grayMatrix,width,height,meta.isOriginal);

            up(55,'🤖 通过代理调用AI模型...');
            const aiModelScore=await queryAIModel(ib64);

            up(85,'📋 生成报告...');
            setTimeout(()=>{
              up(100,'✅ 完成');
              render(an,meta,aiModelScore);
              els.progressContainer.style.display='none';
              els.analyzeBtn.disabled=false;
            },300);
          };
          img.onerror=()=>{els.statusText.textContent='❌ 加载失败';els.analyzeBtn.disabled=false;};
          img.src=ib64;
        });
      }

      els.fileInput.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
      els.uploadZone.addEventListener('dragover',e=>{e.preventDefault();els.uploadZone.classList.add('drag-active');});
      els.uploadZone.addEventListener('dragleave',e=>{e.preventDefault();els.uploadZone.classList.remove('drag-active');});
      els.uploadZone.addEventListener('drop',e=>{e.preventDefault();els.uploadZone.classList.remove('drag-active');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
      function handleFile(f){if(!f.type.startsWith('image/')){alert('请上传图片');return;}if(f.size>10*1024*1024){alert('≤10MB');return;}sf=f;const r=new FileReader();r.onload=e=>{ib64=e.target.result;els.previewImage.src=ib64;els.previewSection.style.display='block';els.fileNameEl.textContent=f.name+' ('+(f.size/1024).toFixed(1)+' KB)';els.analyzeBtn.disabled=false;els.resultCard.style.display='none';els.progressContainer.style.display='none';};r.readAsDataURL(f);}
      els.analyzeBtn.addEventListener('click',()=>{if(!sf)alert('请先上传照片');else start(sf);});
      els.resetLink.addEventListener('click',()=>{resetUI();window.scrollTo({top:0,behavior:'smooth'});});
      resetUI();console.log('✅ v25 就绪');
    })();
  </script>
